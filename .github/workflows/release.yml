name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tilth
            asset_name: tilth-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: tilth
            asset_name: tilth-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tilth
            asset_name: tilth-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tilth
            asset_name: tilth-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tilth.exe
            asset_name: tilth-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
